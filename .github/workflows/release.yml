name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
      prerelease:
        description: "Mark the release as a prerelease"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y --force dioxus-cli@0.7.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # `dx build` (not `bundle`) produces the runnable app — the exe plus its
      # assets — without wrapping it in an installer. We zip that folder so it
      # ships as a portable download: unzip and run the exe, no install needed.
      - name: Build portable app
        run: dx build --release --platform desktop

      - name: Show build output
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem -Path target/dx -Recurse -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -eq 'desktop' } |
            ForEach-Object { Write-Host "== $($_.FullName)"; Get-ChildItem $_.FullName }

      - name: Zip portable app
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path target -Recurse -Filter *.exe -ErrorAction SilentlyContinue |
                 Where-Object { $_.FullName -match '\\dx\\' -and $_.FullName -match '\\release\\' -and $_.Name -ne 'dx.exe' } |
                 Select-Object -First 1
          if (-not $exe) { throw "portable exe not found under target/dx" }
          $appdir = $exe.Directory.FullName
          Write-Host "Packaging $appdir"
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Compress-Archive -Path (Join-Path $appdir '*') -DestinationPath "out/dddioxus-windows-portable.zip" -Force

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          files: out/*.zip
          fail_on_unmatched_files: true

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - uses: cargo-bins/cargo-binstall@main
      - name: Install dioxus CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo binstall -y --force --targets aarch64-apple-darwin dioxus-cli@0.7.5
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/dx" --version

      # A .app bundle is already a portable, double-click-to-run app (no
      # installer). We build one per arch, then lipo them into a single
      # universal .app.
      - name: Bundle both arches
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          dx bundle --release --platform desktop --package-types macos \
            --target aarch64-apple-darwin --out-dir out-arm
          dx bundle --release --platform desktop --package-types macos \
            --target x86_64-apple-darwin --out-dir out-x64

      - name: Merge into a universal .app and zip it
        run: |
          set -euo pipefail
          app_name=$(basename "$(ls -d out-arm/*.app | head -1)")
          bin=$(ls "out-arm/$app_name/Contents/MacOS" | head -1)
          lipo -create \
            "out-arm/$app_name/Contents/MacOS/$bin" \
            "out-x64/$app_name/Contents/MacOS/$bin" \
            -output "out-arm/$app_name/Contents/MacOS/$bin"
          lipo -info "out-arm/$app_name/Contents/MacOS/$bin"

          mkdir -p out
          # ditto is the macOS-correct way to zip a .app (keeps symlinks and
          # bundle structure intact)
          ( cd out-arm && ditto -c -k --sequesterRsrc --keepParent "$app_name" "../out/${app_name%.app}-macos-universal.zip" )

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          files: out/*.zip
          fail_on_unmatched_files: true
